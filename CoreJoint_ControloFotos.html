<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>CoreJoint · Controlo de Fotos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --cream:#F4F1EA; --ink:#2B2723; --ink-soft:#5C564E;
    --terracotta:#C1622E; --terracotta-dark:#9C4C22;
    --line:#E4DDD0; --green:#3F7D5C; --amber:#C08A2E; --red:#B44435; --card:#FFFFFF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:'Source Sans 3',-apple-system,Segoe UI,Roboto,sans-serif; background:var(--cream); color:var(--ink); padding-bottom:50px;}
  h1,h2,h3{font-family:'Fraunces',Georgia,serif; font-weight:600; margin:0;}

  header{position:sticky; top:0; z-index:20; background:var(--cream); padding:14px 16px 10px; border-bottom:1px solid var(--line);}
  header h1{font-size:19px; color:var(--terracotta-dark);}
  header p{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .tabs{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px;}
  .tab{padding:10px 4px; border-radius:12px; border:1px solid var(--line); background:#fff; font-size:13px; font-weight:700; color:var(--ink-soft); text-align:center;}
  .tab.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  main{padding:14px 16px 60px; max-width:640px; margin:0 auto;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px;}
  .card h3{font-size:15px; margin-bottom:10px;}
  .dropzone{border:2px dashed var(--line); border-radius:12px; padding:22px 14px; text-align:center; color:var(--ink-soft); font-size:14px;}
  .filebtn{display:inline-block; margin-top:10px; background:var(--terracotta); color:#fff; padding:11px 18px; border-radius:10px; font-size:14px; font-weight:600; border:none;}
  input[type=file]{display:none;}
  .fname{font-size:13px; color:var(--green); margin-top:8px; font-weight:600;}

  .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .chip{padding:9px 13px; border-radius:16px; border:1px solid var(--line); background:#fff; font-size:13px; font-weight:600; color:var(--ink-soft);}
  .chip.sel{background:var(--terracotta); color:#fff; border-color:var(--terracotta);}
  .field-label{font-size:13px; color:var(--ink-soft); margin:14px 0 4px;}

  .person-card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:8px;}
  .p-top{display:flex; justify-content:space-between; align-items:center;}
  .p-name{font-family:'Fraunces',Georgia,serif; font-weight:600; font-size:15px;}
  .p-pct{font-size:14px; font-weight:700;}
  .p-pct.ok{color:var(--green);} .p-pct.warn{color:var(--amber);} .p-pct.bad{color:var(--red);}
  .bar-bg{background:var(--line); height:6px; border-radius:3px; margin:8px 0; overflow:hidden;}
  .bar-fg{height:100%; border-radius:3px;}
  .missing{font-size:12px; color:var(--ink-soft); margin-top:4px;}
  .missing b{color:var(--red);}
  .empty{color:var(--ink-soft); font-size:14px; padding:30px 10px; text-align:center;}
  .summary-row{display:flex; gap:10px; margin-bottom:14px;}
  .summary-box{flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center;}
  .summary-box .n{font-size:22px; font-weight:700; font-family:'Fraunces',Georgia,serif;}
  .summary-box .l{font-size:11px; color:var(--ink-soft);}
  .resetbtn{background:none; border:1px solid var(--line); color:var(--ink-soft); padding:9px 14px; border-radius:10px; font-size:13px; margin-top:10px;}
</style>
</head>

<main id="main"></main>

<script>

async function api(method, path, body){
  const res = await fetch(SUPA_URL + "/rest/v1/" + path, {
    method,
    headers:{ "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY, "Content-Type":"application/json",
      "Prefer": (method==="PATCH"||method==="POST") ? "return=representation" : "" },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok){ throw new Error(await res.text()); }
  return res.status === 204 ? null : res.json();
}
async function uploadPhoto(blob, path){
  const res = await fetch(`${SUPA_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method:"POST",
    headers:{ "apikey":SUPA_KEY, "Authorization":"Bearer "+SUPA_KEY, "Content-Type":"image/jpeg", "x-upsert":"true" },
    body: blob
  });
  if(!res.ok) throw new Error(await res.text());
  return `${SUPA_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}
async function upsertDaily(loja, tipo, data, foto_path, turno){
  const filter = `loja=eq.${encodeURIComponent(loja)}&tipo=eq.${tipo}&data=eq.${data}&turno=eq.${turno}`;
  const patched = await api("PATCH", `cj_daily_reportes?${filter}`, {foto_path, enviado_por:"Import WhatsApp", criado_em:new Date().toISOString()});
  if(!patched || patched.length===0){
    await api("POST", "cj_daily_reportes", {loja, tipo, data, foto_path, turno, enviado_por:"Import WhatsApp"});
  }
}
function slug(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").toLowerCase(); }

const CATEGORIAS = ["Vitrine","Vendas","Inventário"];
const state = {
  "Vitrine": {raw:null, fname:null, zip:null, senders:[], selected:new Set(), period:"mes", data:null, lojaMap:{}, turno:"manha"},
  "Vendas": {raw:null, fname:null, zip:null, senders:[], selected:new Set(), period:"mes", data:null, lojaMap:{}},
  "Inventário": {raw:null, fname:null, zip:null, senders:[], selected:new Set(), period:"mes", data:null, lojaMap:{}, invSub:"global"}
};
let currentCat = CATEGORIAS[0];

function buildTabs(){
  const row = document.getElementById("tabsRow");
  row.innerHTML = "";
  CATEGORIAS.forEach(c=>{
    const b = document.createElement("div");
    b.className = "tab" + (c===currentCat ? " active":"");
    const pend = pendingCount(c);
    b.innerHTML = c + (pend>0 ? ` <span style="background:var(--red); color:#fff; border-radius:8px; padding:1px 6px; font-size:11px;">${pend}</span>` : "");
    b.onclick = ()=>{ currentCat = c; buildTabs(); render(); };
    row.appendChild(b);
  });
}

function pendingCount(cat){
  const s = state[cat];
  if(!s.data) return 0;
  const bounds = periodBounds(cat);
  if(!bounds) return 0;
  const dates = dateRange(bounds.start, bounds.end);
  let count = 0;
  s.selected.forEach(name=>{
    const sentDates = s.data.bySender[name] || new Set();
    const hasMissing = dates.some(d=>!sentDates.has(d));
    if(hasMissing) count++;
  });
  return count;
}

/* ---------- PARSING DO EXPORT DO WHATSAPP ---------- */
const IMG_HINTS = /imagem om?itida|imagem ocultada|m[ií]dia oculta|image omitted|media omitted|<anexado|\.jpe?g|\.png|\.heic|IMG-|PHOTO-/i;
const ATTACH_NAME = /([\w\-]+\.(?:jpe?g|png|heic|webp))/i;
const LINE_ANDROID = /^(\d{1,2}\/\d{1,2}\/\d{2,4}),?\s(\d{1,2}:\d{2})\s-\s([^:]+):\s(.*)$/;
const LINE_IOS = /^\u200e?\[(\d{1,2}\/\d{1,2}\/\d{2,4}),\s(\d{1,2}:\d{2}:\d{2})\]\s([^:]+):\s(.*)$/;

function parseDate(dstr){
  const parts = dstr.split("/");
  let [d,m,y] = parts.map(p=>parseInt(p,10));
  if(y < 100) y += 2000;
  return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function parseChat(text){
  const lines = text.split(/\r?\n/);
  const messages = [];
  let current = null;
  lines.forEach(line=>{
    line = line.replace(/^\u200e/, "");
    let m = line.match(LINE_ANDROID) || line.match(LINE_IOS);
    if(m){
      if(current) messages.push(current);
      current = { date: parseDate(m[1]), sender: m[3].trim(), text: m[4] };
    } else if(current){
      current.text += "\n" + line;
    }
  });
  if(current) messages.push(current);
  return messages;
}

function analyze(cat){
  const s = state[cat];
  const messages = parseChat(s.raw);
  const bySender = {};
  const bySenderFiles = {};
  let minDate=null, maxDate=null;
  messages.forEach(m=>{
    if(!bySender[m.sender]) bySender[m.sender] = new Set();
    if(!bySenderFiles[m.sender]) bySenderFiles[m.sender] = {};
    const attachMatch = m.text.match(ATTACH_NAME);
    const hasAttachInZip = attachMatch && s.zip && s.zip.file(attachMatch[1]);
    if(hasAttachInZip || IMG_HINTS.test(m.text)){
      bySender[m.sender].add(m.date);
      if(hasAttachInZip){
        if(!bySenderFiles[m.sender][m.date]) bySenderFiles[m.sender][m.date] = [];
        bySenderFiles[m.sender][m.date].push(attachMatch[1]);
      }
    }
    if(!minDate || m.date<minDate) minDate=m.date;
    if(!maxDate || m.date>maxDate) maxDate=m.date;
  });
  s.senders = Object.keys(bySender).sort();
  s.selected = new Set(s.senders);
  s.data = {bySender, bySenderFiles, minDate, maxDate};
  s.savedAt = new Date().toISOString();
  saveToStorage(cat);
}

function saveToStorage(cat){
  const s = state[cat];
  if(!s.data) return;
  const plain = {
    fname: s.fname,
    savedAt: s.savedAt,
    senders: s.senders,
    selected: [...s.selected],
    period: s.period,
    lojaMap: s.lojaMap,
    invSub: s.invSub,
    turno: s.turno,
    minDate: s.data.minDate,
    maxDate: s.data.maxDate,
    bySender: Object.fromEntries(s.senders.map(n=>[n, [...s.data.bySender[n]]]))
  };
  try{ localStorage.setItem("cj_fotos_"+cat, JSON.stringify(plain)); }catch(e){}
}

function loadFromStorage(cat){
  try{
    const raw = localStorage.getItem("cj_fotos_"+cat);
    if(!raw) return;
    const plain = JSON.parse(raw);
    const s = state[cat];
    s.fname = plain.fname;
    s.savedAt = plain.savedAt;
    s.senders = plain.senders;
    s.selected = new Set(plain.selected);
    s.period = plain.period || "mes";
    s.lojaMap = plain.lojaMap || {};
    s.invSub = plain.invSub || "global";
    s.turno = plain.turno || "manha";
    s.raw = "__restored__"; // marca que há dados, mesmo sem o texto completo
    s.zip = null;
    const bySender = {};
    Object.keys(plain.bySender).forEach(n=> bySender[n] = new Set(plain.bySender[n]));
    s.data = {bySender, bySenderFiles:{}, minDate:plain.minDate, maxDate:plain.maxDate};
  }catch(e){ console.error(e); }
}

function dateRange(startStr, endStr){
  const out = [];
  let d = new Date(startStr+"T00:00:00");
  const end = new Date(endStr+"T00:00:00");
  while(d<=end){
    out.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return out;
}

function periodBounds(cat){
  const s = state[cat];
  if(!s.data) return null;
  const today = new Date();
  let start, end = s.data.maxDate;
  if(s.period === "7"){
    const d = new Date(end+"T00:00:00"); d.setDate(d.getDate()-6);
    start = d.toISOString().slice(0,10);
  } else if(s.period === "mes"){
    start = end.slice(0,8) + "01";
  } else {
    start = s.data.minDate;
  }
  if(start < s.data.minDate) start = s.data.minDate;
  return {start, end};
}

/* ---------- RENDER ---------- */
function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";
  const s = state[currentCat];

  if(!s.raw){
    main.appendChild(uploadCard(currentCat));
    return;
  }

  const toolbar = document.createElement("div");
  toolbar.className = "card";
  const savedTxt = s.savedAt ? new Date(s.savedAt).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : "";
  toolbar.innerHTML = `<h3>Última verificação</h3><div class="field-label">${savedTxt} · ${s.fname||''}</div>`;
  const reset = document.createElement("button");
  reset.className = "resetbtn";
  reset.textContent = "📥 Carregar novo export";
  reset.onclick = ()=>{ s.raw=null; s.fname=null; s.data=null; s.zip=null; localStorage.removeItem("cj_fotos_"+currentCat); buildTabs(); render(); };
  toolbar.appendChild(reset);
  main.appendChild(toolbar);

  // período
  const periodCard = document.createElement("div");
  periodCard.className = "card";
  periodCard.innerHTML = `<h3>Período</h3>`;
  const pRow = document.createElement("div");
  pRow.className = "chip-row";
  [["7","Últimos 7 dias"],["mes","Este mês"],["tudo","Tudo"]].forEach(([val,label])=>{
    const c = document.createElement("div");
    c.className = "chip" + (s.period===val ? " sel":"");
    c.textContent = label;
    c.onclick = ()=>{ s.period=val; saveToStorage(currentCat); buildTabs(); render(); };
    pRow.appendChild(c);
  });
  periodCard.appendChild(pRow);
  main.appendChild(periodCard);

  // pessoas esperadas
  const peopleCard = document.createElement("div");
  peopleCard.className = "card";
  peopleCard.innerHTML = `<h3>Quem deve enviar?</h3><div class="field-label">Toca para incluir/excluir da verificação</div>`;
  const chipRow = document.createElement("div");
  chipRow.className = "chip-row";
  s.senders.forEach(name=>{
    const c = document.createElement("div");
    c.className = "chip" + (s.selected.has(name) ? " sel":"");
    c.textContent = name;
    c.onclick = ()=>{
      if(s.selected.has(name)) s.selected.delete(name); else s.selected.add(name);
      saveToStorage(currentCat);
      buildTabs();
      render();
    };
    chipRow.appendChild(c);
  });
  peopleCard.appendChild(chipRow);
  main.appendChild(peopleCard);

  // importação automática (só disponível com zip, i.e. export com multimédia)
  if(s.zip){
    const impCard = document.createElement("div");
    impCard.className = "card";
    impCard.innerHTML = `<h3>🚀 Importar fotos para o sistema</h3><div class="field-label">Associa cada pessoa à loja certa — só precisas de fazer isto uma vez.</div>`;
    const mapWrap = document.createElement("div");
    mapWrap.style.cssText = "display:flex; flex-direction:column; gap:8px; margin-top:10px;";
    s.senders.filter(n=>s.selected.has(n)).forEach(name=>{
      const row = document.createElement("div");
      row.style.cssText = "display:flex; align-items:center; gap:10px;";
      row.innerHTML = `<div style="flex:1; font-size:13px; font-weight:600;">${name}</div>
        <select data-map="${name}" style="flex:1.2; padding:8px; border-radius:8px; border:1px solid var(--line);">
          <option value="">— ignorar —</option>
          ${LOJAS.map(l=>`<option value="${l}" ${s.lojaMap[name]===l?'selected':''}>${l}</option>`).join("")}
        </select>`;
      row.querySelector('select').onchange = (e)=>{ s.lojaMap[name] = e.target.value; saveToStorage(currentCat); };
      mapWrap.appendChild(row);
    });
    impCard.appendChild(mapWrap);

    if(currentCat==="Inventário"){
      const subLabel = document.createElement("div");
      subLabel.className = "field-label";
      subLabel.style.marginTop = "14px";
      subLabel.textContent = "A que categoria de inventário corresponde este grupo?";
      impCard.appendChild(subLabel);
      const subRow = document.createElement("div");
      subRow.className = "chip-row";
      INV_SUBCATS.forEach(sc=>{
        const c = document.createElement("div");
        c.className = "chip" + (s.invSub===sc.key ? " sel":"");
        c.textContent = sc.label;
        c.onclick = ()=>{ s.invSub = sc.key; saveToStorage(currentCat); render(); };
        subRow.appendChild(c);
      });
      impCard.appendChild(subRow);
    }
    if(currentCat==="Vitrine"){
      const subLabel = document.createElement("div");
      subLabel.className = "field-label";
      subLabel.style.marginTop = "14px";
      subLabel.textContent = "A que turno corresponde este grupo? (manhã/almoço/lanche)";
      impCard.appendChild(subLabel);
      const subRow = document.createElement("div");
      subRow.className = "chip-row";
      VITRINE_TURNOS_CF.forEach(t=>{
        const c = document.createElement("div");
        c.className = "chip" + (s.turno===t.key ? " sel":"");
        c.textContent = t.label;
        c.onclick = ()=>{ s.turno = t.key; saveToStorage(currentCat); render(); };
        subRow.appendChild(c);
      });
      impCard.appendChild(subRow);
    }

    const impBtn = document.createElement("button");
    impBtn.className = "copybtn";
    impBtn.style.marginTop = "16px";
    impBtn.textContent = "Importar tudo agora";
    impBtn.onclick = ()=>runImport(currentCat, impBtn);
    impCard.appendChild(impBtn);
    const impStatus = document.createElement("div");
    impStatus.id = "impStatus";
    impStatus.className = "field-label";
    impStatus.style.marginTop = "8px";
    impCard.appendChild(impStatus);

    main.appendChild(impCard);
  } else {
    const note = document.createElement("div");
    note.className = "card";
    note.innerHTML = `<div class="field-label">💡 Para importar as fotos automaticamente para o sistema, exporta a conversa com <b>"incluir multimédia"</b> (zip). Um export "sem multimédia" só serve para a verificação de quem enviou ou não.</div>`;
    main.appendChild(note);
  }

  // resultados
  const bounds = periodBounds(currentCat);
  const dates = dateRange(bounds.start, bounds.end);
  const totalDias = dates.length;

  const results = [...s.selected].map(name=>{
    const sentDates = s.data.bySender[name] || new Set();
    const sentInRange = dates.filter(d=>sentDates.has(d));
    const missing = dates.filter(d=>!sentDates.has(d));
    return {name, sent:sentInRange.length, missing, pct: totalDias? Math.round(sentInRange.length/totalDias*100):0};
  }).sort((a,b)=>a.pct-b.pct);

  const summary = document.createElement("div");
  summary.className = "summary-row";
  const okCount = results.filter(r=>r.pct===100).length;
  summary.innerHTML = `
    <div class="summary-box"><div class="n">${totalDias}</div><div class="l">dias no período</div></div>
    <div class="summary-box"><div class="n">${okCount}/${results.length}</div><div class="l">100% cumprimento</div></div>
  `;
  main.appendChild(summary);

  if(results.length===0){
    main.innerHTML += '<div class="empty">Nenhuma pessoa selecionada.</div>';
    return;
  }

  results.forEach(r=>{
    const card = document.createElement("div");
    card.className = "person-card";
    const pctClass = r.pct>=90 ? "ok" : r.pct>=60 ? "warn" : "bad";
    const barColor = r.pct>=90 ? "var(--green)" : r.pct>=60 ? "var(--amber)" : "var(--red)";
    let missingHtml = "";
    if(r.missing.length>0){
      const shown = r.missing.slice(0,6).map(d=>d.slice(8,10)+"/"+d.slice(5,7)).join(", ");
      const extra = r.missing.length>6 ? ` +${r.missing.length-6}` : "";
      missingHtml = `<div class="missing">Faltam: <b>${shown}${extra}</b></div>`;
    }
    card.innerHTML = `
      <div class="p-top"><div class="p-name">${r.name}</div><div class="p-pct ${pctClass}">${r.pct}%</div></div>
      <div class="bar-bg"><div class="bar-fg" style="width:${r.pct}%; background:${barColor};"></div></div>
      <div class="missing">${r.sent}/${totalDias} dias com foto</div>
      ${missingHtml}
      ${s.zip ? `<button class="resetbtn" style="margin-top:8px;" data-photos="${r.name}">📷 Ver fotos enviadas</button><div class="photo-strip" style="display:none; flex-wrap:wrap; gap:6px; margin-top:8px;"></div>` : ""}
    `;
    main.appendChild(card);
    if(s.zip){
      const btn = card.querySelector('[data-photos]');
      const strip = card.querySelector('.photo-strip');
      btn.onclick = async ()=>{
        if(strip.style.display === "flex"){ strip.style.display = "none"; return; }
        strip.style.display = "flex";
        if(strip.dataset.loaded) return;
        strip.dataset.loaded = "1";
        const filesByDate = s.data.bySenderFiles[r.name] || {};
        const relevantDates = dates.filter(d=>filesByDate[d]);
        if(relevantDates.length===0){ strip.innerHTML = '<div class="missing">Sem fotos identificadas no zip para este período.</div>'; return; }
        for(const d of relevantDates){
          for(const fname of filesByDate[d]){
            const entry = s.zip.file(fname);
            if(!entry) continue;
            const blob = await entry.async("blob");
            const url = URL.createObjectURL(blob);
            const img = document.createElement("img");
            img.src = url;
            img.style.cssText = "width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--line);";
            img.title = d;
            img.onclick = ()=>window.open(url, "_blank");
            strip.appendChild(img);
          }
        }
      };
    }
  });
}

async function runImport(cat, btn){
  const s = state[cat];
  const statusEl = document.getElementById("impStatus");
  const tipoKey = cat==="Vitrine" ? "vitrine" : cat==="Vendas" ? "vendas" : s.invSub;
  const bounds = periodBounds(cat);
  const dates = dateRange(bounds.start, bounds.end);
  const jobs = [];
  s.senders.filter(n=>s.selected.has(n) && s.lojaMap[n]).forEach(name=>{
    const loja = s.lojaMap[name];
    const filesByDate = s.data.bySenderFiles[name] || {};
    dates.forEach(d=>{
      if(filesByDate[d]) jobs.push({loja, date:d, fname:filesByDate[d][0]});
    });
  });
  if(jobs.length===0){ toast("Sem fotos para importar (verifica o mapeamento de lojas)."); return; }

  btn.disabled = true;
  let done=0, errors=0;
  for(const job of jobs){
    try{
      statusEl.textContent = `A importar ${done+1}/${jobs.length}...`;
      const entry = s.zip.file(job.fname);
      const blob = await entry.async("blob");
      const turnoForPath = cat==="Vitrine" ? s.turno : "unico";
      const path = cat==="Inventário"
        ? `${slug(job.loja)}/inventario/${tipoKey}/${job.date}.jpg`
        : `${slug(job.loja)}/${tipoKey}/${turnoForPath}/${job.date}.jpg`;
      const url = await uploadPhoto(blob, path);
      if(cat==="Inventário"){
        await api("POST", "cj_inventario_reportes", {loja:job.loja, categoria:tipoKey, data:job.date, foto_path:url, enviado_por:"Import WhatsApp"});
      } else {
        await upsertDaily(job.loja, tipoKey, job.date, url, turnoForPath);
      }
      done++;
    }catch(e){
      console.error(e);
      errors++;
    }
  }
  btn.disabled = false;
  statusEl.textContent = `Concluído: ${done} importadas${errors>0 ? `, ${errors} com erro` : ''}.`;
  toast("Importação concluída");
}

function uploadCard(cat){
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h3>Carregar conversa — ${cat}</h3>
    <div class="dropzone">
      No WhatsApp: abre o grupo → nome do grupo → Exportar conversa → <b>incluir multimédia</b>. Sai um ficheiro .zip — carrega-o aqui (também aceita .txt sem fotos).
      <br><label class="filebtn">Escolher ficheiro<input type="file" accept=".txt,.zip" id="fileInput-${cat}"></label>
      <div id="loadMsg-${cat}" style="margin-top:8px; font-size:13px; color:var(--ink-soft);"></div>
    </div>
    <div class="field-label" style="margin-top:14px;">Ou, só para uma verificação rápida (sem fotos), cola aqui o texto da conversa:</div>
    <textarea id="pasteArea-${cat}" placeholder="Cola aqui o texto exportado..." style="width:100%; min-height:80px; padding:10px; border:1px solid var(--line); border-radius:10px; font-size:13px; margin-top:6px;"></textarea>
    <button class="resetbtn" style="margin-top:8px;" id="pasteBtn-${cat}">Analisar texto colado</button>
  `;
  setTimeout(()=>{
    document.getElementById(`fileInput-${cat}`).addEventListener("change", async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const msgEl = document.getElementById(`loadMsg-${cat}`);
      try{
        if(file.name.toLowerCase().endsWith(".zip")){
          const sizeMB = (file.size / (1024*1024)).toFixed(0);
          msgEl.textContent = `A abrir o zip (${sizeMB} MB)... pode demorar um pouco se tiver muitas fotos.`;
          if(file.size > 300*1024*1024){
            msgEl.textContent = `Este ficheiro tem ${sizeMB} MB — é muito grande para o telemóvel processar de uma vez. Tenta exportar um período mais curto (ex: só o último mês) ou usa "sem multimédia" para a verificação, e importa as fotos aos poucos.`;
            return;
          }
          let zip;
          try{
            zip = await JSZip.loadAsync(file);
          }catch(zipErr){
            msgEl.textContent = "Não consegui abrir o zip: " + (zipErr.message || zipErr) + ". Confirma que é mesmo o ficheiro exportado do WhatsApp.";
            return;
          }
          const txtEntry = Object.values(zip.files).find(f=>!f.dir && f.name.toLowerCase().endsWith(".txt"));
          if(!txtEntry){ msgEl.textContent = "Abri o zip, mas não encontrei o .txt da conversa lá dentro."; return; }
          const text = await txtEntry.async("string");
          state[cat].raw = text;
          state[cat].zip = zip;
          state[cat].fname = file.name;
        } else {
          const text = await file.text();
          state[cat].raw = text;
          state[cat].zip = null;
          state[cat].fname = file.name;
        }
        analyze(cat);
        buildTabs();
        render();
      }catch(err){
        console.error(err);
        msgEl.textContent = "Erro: " + (err.message || err);
      }
    });
    document.getElementById(`pasteBtn-${cat}`).addEventListener("click", ()=>{
      const text = document.getElementById(`pasteArea-${cat}`).value;
      if(!text.trim()){ toast("Cola o texto primeiro"); return; }
      state[cat].raw = text;
      state[cat].zip = null;
      state[cat].fname = "Texto colado";
      analyze(cat);
      buildTabs();
      render();
    });
  }, 0);
  return card;
}
