<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Foto do dia</title>
<style>
  :root{
    --cream:#F4F1EA; --ink:#2B2723; --ink-soft:#5C564E;
    --terracotta:#C1622E; --terracotta-dark:#9C4C22;
    --line:#E4DDD0; --green:#3F7D5C; --amber:#C08A2E; --red:#B44435; --card:#FFFFFF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:'Source Sans 3',-apple-system,Segoe UI,Roboto,sans-serif; background:var(--cream); color:var(--ink); min-height:100vh;}
  h1,h2{font-family:'Fraunces',Georgia,serif; font-weight:600; margin:0;}
  header{padding:26px 20px 12px; text-align:center;}
  header h1{font-size:22px; color:var(--terracotta-dark);}
  header p{font-size:13px; color:var(--ink-soft); margin-top:4px;}
  main{padding:10px 18px 50px; max-width:460px; margin:0 auto;}
  .big-btn{width:100%; display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:12px;}
  .big-btn .icon{font-size:30px; width:40px;}
  .big-btn .txt{flex:1; text-align:left;}
  .big-btn .txt .t{font-family:'Fraunces',Georgia,serif; font-size:17px; font-weight:600;}
  .big-btn .txt .d{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .big-btn .status{font-size:20px;}
  .warn-card{background:var(--card); border-left:4px solid var(--red); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:14px; font-size:13px;}
  .empty{color:var(--ink-soft); font-size:14px; padding:30px 10px; text-align:center;}

  .overlay{position:fixed; inset:0; background:rgba(43,39,35,.5); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  .modal{background:var(--cream); width:100%; max-width:480px; border-radius:18px 18px 0 0; padding:22px 20px 28px; max-height:90vh; overflow-y:auto;}
  .modal h2{font-size:19px; color:var(--terracotta-dark); margin-bottom:4px;}
  .modal .sub{font-size:13px; color:var(--ink-soft); margin-bottom:14px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:13px; color:var(--ink-soft); margin-bottom:6px;}
  .field input{width:100%; padding:12px 14px; font-size:16px; border:1px solid var(--line); border-radius:10px; background:#fff;}
  .cam-preview{width:100%; border-radius:10px; margin-top:8px; max-height:220px; object-fit:contain; background:#eee;}
  .filebtn{display:inline-block; background:var(--terracotta); color:#fff; padding:12px 20px; border-radius:10px; font-size:15px; font-weight:600;}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .btn-cancel{flex:1; background:none; border:1px solid var(--line); padding:13px; border-radius:10px; font-size:15px; color:var(--ink-soft);}
  .btn-save{flex:1.4; background:var(--terracotta); color:#fff; border:none; padding:13px; border-radius:10px; font-size:15px; font-weight:600;}
  .btn-save:disabled{opacity:.5;}
  .toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px; font-size:14px; z-index:99; opacity:0; transition:opacity .25s;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <h1 id="titleLoja">Foto do dia</h1>
  <p id="dateSub"></p>
</header>
<main id="main"></main>
<div id="toast" class="toast"></div>

<script>
const SUPA_URL = "https://isdaegejkxgtzjcpzstr.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzZGFlZ2Vqa3hndHpqY3B6c3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDMzNDMsImV4cCI6MjA5NTk3OTM0M30.M7WZQXo-okNFaYhqF3WMxIB0KO7MsM1OH-JnBPWQ54k";
const BUCKET = "cj_reportes_fotos";

const INV_CATS = [
  {key:"raspadinhas", label:"Raspadinhas", freq:"semanal"},
  {key:"laranja", label:"Laranja", freq:"semanal"},
  {key:"cafe", label:"Café", freq:"semanal"},
  {key:"tabaco", label:"Tabaco", freq:"quinzenal"},
  {key:"global", label:"Global", freq:"mensal3"}
];

const params = new URLSearchParams(location.search);
const currentLoja = params.get("loja") || "Loja não identificada";
let dailyRows = [], invRows = [];
let pendingPhoto = null;

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}
function isoDate(d){ return d.toISOString().slice(0,10); }
function todayStr(){ return isoDate(new Date()); }
function slug(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").toLowerCase(); }

async function api(method, path, body){
  const res = await fetch(SUPA_URL + "/rest/v1/" + path, {
    method,
    headers:{
      "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY,
      "Content-Type":"application/json",
      "Prefer": (method==="PATCH"||method==="POST") ? "return=representation" : ""
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok){ throw new Error(await res.text()); }
  return res.status === 204 ? null : res.json();
}
async function uploadPhoto(dataUrl, path){
  const blob = await (await fetch(dataUrl)).blob();
  const res = await fetch(`${SUPA_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method:"POST",
    headers:{ "apikey":SUPA_KEY, "Authorization":"Bearer "+SUPA_KEY, "Content-Type":"image/jpeg", "x-upsert":"true" },
    body: blob
  });
  if(!res.ok) throw new Error(await res.text());
  return `${SUPA_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}
async function upsertDaily(loja, tipo, data, foto_path, turno){
  const filter = `loja=eq.${encodeURIComponent(loja)}&tipo=eq.${tipo}&data=eq.${data}&turno=eq.${turno}`;
  const patched = await api("PATCH", `cj_daily_reportes?${filter}`, {foto_path, enviado_por:loja, criado_em:new Date().toISOString()});
  if(!patched || patched.length===0){
    await api("POST", "cj_daily_reportes", {loja, tipo, data, foto_path, turno, enviado_por:loja});
  }
}

function weekWindow(d){
  const day = (d.getDay()+6)%7;
  const start = new Date(d); start.setDate(d.getDate()-day);
  const end = new Date(start); end.setDate(start.getDate()+6);
  return {start, end};
}
function biweekWindow(d){
  const day = d.getDate();
  const start = day<=15 ? new Date(d.getFullYear(),d.getMonth(),1) : new Date(d.getFullYear(),d.getMonth(),16);
  const end = day<=15 ? new Date(d.getFullYear(),d.getMonth(),15) : new Date(d.getFullYear(),d.getMonth()+1,0);
  return {start, end};
}
function month3Window(d){
  const start = new Date(d.getFullYear(), d.getMonth(), 15);
  const end = new Date(d.getFullYear(), d.getMonth(), 21);
  return {start, end};
}
function windowFor(freq, d){
  if(freq==="semanal") return weekWindow(d);
  if(freq==="quinzenal") return biweekWindow(d);
  return month3Window(d);
}
function inRange(dateStr, start, end){
  const d = new Date(dateStr+"T00:00:00");
  return d>=start && d<=end;
}
function isLastDaysOfMonth(threshold=3){
  const d = new Date();
  const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  return d.getDate() > lastDay - threshold;
}
function invStatus(catKey, freq){
  const today = new Date();
  const w = windowFor(freq, today);
  const rows = invRows.filter(r=>r.categoria===catKey && inRange(r.data, w.start, w.end));
  if(rows.length>0) return {state:"ok", latest: rows[0], window:w};
  return {state: today>w.end ? "late" : "pend", latest:null, window:w};
}
function dailyStatus(tipo, dateStr, turno){
  return dailyRows.find(r=>r.tipo===tipo && r.data===dateStr && r.turno===turno) || null;
}

async function loadAll(){
  try{
    const f = `&loja=eq.${encodeURIComponent(currentLoja)}`;
    dailyRows = await api("GET", `cj_daily_reportes?select=*${f}&order=data.desc`);
    invRows = await api("GET", `cj_inventario_reportes?select=*${f}&order=data.desc`);
    render();
  }catch(e){ console.error(e); toast("Erro a carregar"); }
}

function render(){
  document.getElementById("titleLoja").textContent = currentLoja;
  document.getElementById("dateSub").textContent = new Date().toLocaleDateString('pt-PT', {weekday:'long', day:'2-digit', month:'long'});
  const main = document.getElementById("main");
  main.innerHTML = "";

  if(currentLoja === "Loja não identificada"){
    main.innerHTML = '<div class="empty">Este link não está associado a nenhuma loja. Pede o link correto.</div>';
    return;
  }

  const today = todayStr();
  const VITRINE_TURNOS = [
    {key:"manha", label:"Vitrine — Manhã", icon:"🌅"},
    {key:"almoco", label:"Vitrine — Almoço", icon:"🌞"},
    {key:"lanche", label:"Vitrine — Lanche", icon:"🌇"}
  ];
  VITRINE_TURNOS.forEach(t=>{
    const rec = dailyStatus("vitrine", today, t.key);
    const btn = document.createElement("button");
    btn.className = "big-btn";
    btn.innerHTML = `<div class="icon">${t.icon}</div><div class="txt"><div class="t">${t.label}</div><div class="d">${rec ? 'Já enviaste' : 'Ainda não enviaste'}</div></div><div class="status">${rec?'✅':'⭕'}</div>`;
    btn.onclick = ()=>openCapture("daily", "vitrine", t.label, t.key);
    main.appendChild(btn);
  });
  {
    const rec = dailyStatus("vendas", today, "unico");
    const btn = document.createElement("button");
    btn.className = "big-btn";
    btn.innerHTML = `<div class="icon">🧾</div><div class="txt"><div class="t">Vendas — Final do dia</div><div class="d">${rec ? 'Já enviaste' : 'Ainda não enviaste'}</div></div><div class="status">${rec?'✅':'⭕'}</div>`;
    btn.onclick = ()=>openCapture("daily", "vendas", "Vendas — Final do dia", "unico");
    main.appendChild(btn);
  }

  const dueInv = INV_CATS.map(c=>({...c, st:invStatus(c.key, c.freq)})).filter(c=>c.st.state!=="ok");
  if(dueInv.length>0){
    const title = document.createElement("div");
    title.style.cssText = "font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:18px 0 8px;";
    title.textContent = "Inventário pendente";
    main.appendChild(title);

    if(isLastDaysOfMonth()){
      const warn = document.createElement("div");
      warn.className = "warn-card";
      warn.textContent = "⚠ Estamos nos últimos dias do mês — evita fazer contagens agora, para não desalinhar com o fecho.";
      main.appendChild(warn);
    }

    dueInv.forEach(c=>{
      const btn = document.createElement("button");
      btn.className = "big-btn";
      const late = c.st.state==="late";
      btn.innerHTML = `<div class="icon">📦</div><div class="txt"><div class="t">${c.label}</div><div class="d">${late?'Atrasado':'Por enviar'}</div></div><div class="status">${late?'🔴':'⏳'}</div>`;
      btn.onclick = ()=>openCapture("inv", c.key, c.label);
      main.appendChild(btn);
    });
  }
}

function openCapture(kind, key, label, turno){
  pendingPhoto = null;
  const isInv = kind==="inv";
  const overlay = document.createElement("div");
  overlay.className = "overlay"; overlay.id = "capOverlay";
  overlay.innerHTML = `
    <div class="modal">
      <h2>${label}</h2>
      <div class="sub">${currentLoja} · ${new Date().toLocaleDateString('pt-PT')}</div>
      <label class="filebtn">📷 Tirar foto<input type="file" accept="image/*" capture="environment" id="capFile"></label>
      <img id="capPreview" class="cam-preview" style="display:none;">
      ${isInv ? `
        <div class="field" style="margin-top:16px;">
          <label>Valor do inventário (€)</label>
          <input id="vInv" type="number" inputmode="decimal" step="0.01" placeholder="0.00">
        </div>
        ${key==="global" ? `
        <div class="field">
          <label>Valor CNVs (consumíveis) (€)</label>
          <input id="vCnvs" type="number" inputmode="decimal" step="0.01" placeholder="0.00">
        </div>` : ``}
      ` : ``}
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCapture()">Cancelar</button>
        <button class="btn-save" id="capSaveBtn" onclick="confirmCapture('${kind}','${key}','${turno||''}')" disabled>Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById("capFile").addEventListener("change", handleCapFile);
}
function closeCapture(){
  const o = document.getElementById("capOverlay");
  if(o) o.remove();
  pendingPhoto = null;
}
function handleCapFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    const img = new Image();
    img.onload = ()=>{
      const maxDim = 1280;
      let {width,height} = img;
      if(width>height && width>maxDim){ height=height*maxDim/width; width=maxDim; }
      else if(height>maxDim){ width=width*maxDim/height; height=maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width=width; canvas.height=height;
      canvas.getContext("2d").drawImage(img,0,0,width,height);
      pendingPhoto = canvas.toDataURL("image/jpeg",0.7);
      const prev = document.getElementById("capPreview");
      prev.src = pendingPhoto; prev.style.display="block";
      document.getElementById("capSaveBtn").disabled = false;
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
}
async function confirmCapture(kind, key, turno){
  if(!pendingPhoto){ toast("Tira a foto primeiro"); return; }
  const today = todayStr();
  try{
    if(kind==="daily"){
      const path = `${slug(currentLoja)}/${key}/${turno}/${today}.jpg`;
      const url = await uploadPhoto(pendingPhoto, path);
      await upsertDaily(currentLoja, key, today, url, turno);
    } else {
      const vInv = parseFloat(document.getElementById("vInv").value);
      const cnvsEl = document.getElementById("vCnvs");
      const vCnvs = cnvsEl ? parseFloat(cnvsEl.value) : NaN;
      const path = `${slug(currentLoja)}/inventario/${key}/${today}.jpg`;
      const url = await uploadPhoto(pendingPhoto, path);
      await api("POST", "cj_inventario_reportes", {
        loja:currentLoja, categoria:key, data:today, foto_path:url,
        valor_inventario: isNaN(vInv)?null:vInv, valor_cnvs: isNaN(vCnvs)?null:vCnvs, enviado_por:currentLoja
      });
    }
    toast("Registado! Obrigado 🙌");
    closeCapture();
    await loadAll();
  }catch(e){
    console.error(e);
    toast("Erro ao guardar — tenta de novo");
  }
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
